<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRUDS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="cruds">
        <div class="head">
            <h2>cruds</h2>
            <p>product managment system</p>
        </div>
        <div class="inputs">
            <input type="text" id="title" placeholder="title">
            <div class="price">
                <input onkeyup="getTotal()" type="number" id="price" placeholder="price">
                <input onkeyup="getTotal()" type="number" id="taxes" placeholder="taxes">
                <input onkeyup="getTotal()" type="number" id="ads" placeholder="ads">
                <input onkeyup="getTotal()" type="number" id="discount" placeholder="discount">
                <small id="total"></small>
            </div>
            <input type="number" id="count" placeholder="count">
            <input id="category" placeholder="category">
            <button id="createBtn">create</button>
        </div>
        <div class="outputs">
            <div class="searchBlock">
                <input onkeyup="searchData(this.value)" type="text" id="search" placeholder="Search">
                <div class="searchBtns">
                    <button onclick="getSearchMode(id)" id="searchByTitle">search by title</button>
                    <button onclick="getSearchMode(id)" id="searchByCategory">search by Category</button>
                </div>
                <div id="deleteAll">

                </div>
                <table>
                    <tr>
                        <th>id</th>
                        <th>title</th>
                        <th>price</th>
                        <th>taxes</th>
                        <th>ads</th>
                        <th>discount</th>
                        <th>total</th>
                        <th>category</th>
                        <th>update</th>
                        <th>delete</th> 
                    </tr>

                    <tbody id="tbody">
                        
                    </tbody>
                </table>
            </div>
        </div>
   </div>
   <script src="script.js"></script>
</body>   
</html>
